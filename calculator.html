<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculator</title>
  <link rel="stylesheet" href="calculator.css">
</head>

<body>
  <section class="calculator" aria-label="Calculator UI (HTML/CSS only)">
    <div class="header">
      <div class="title">Calculator</div>
      <div class="badge">White · Tan</div>
    </div>

    <div class="display" role="status" aria-live="polite">
      <div class="value">0</div>
    </div>

    <div class="keys" aria-hidden="true">
      <!-- Row 1 -->
      <button class="key ac" type="button">AC</button>
      <button class="key" type="button">±</button>
      <button class="key" type="button">%</button>
      <button class="key operator" type="button">÷</button>

      <!-- Row 2 -->
      <button class="key" type="button">7</button>
      <button class="key" type="button">8</button>
      <button class="key" type="button">9</button>
      <button class="key operator" type="button">×</button>

      <!-- Row 3 -->
      <button class="key" type="button">4</button>
      <button class="key" type="button">5</button>
      <button class="key" type="button">6</button>
      <button class="key operator" type="button">−</button>

      <!-- Row 4 -->
      <button class="key" type="button">1</button>
      <button class="key" type="button">2</button>
      <button class="key" type="button">3</button>
      <button class="key operator" type="button">+</button>

      <!-- Row 5 -->
      <button class="key zero" type="button">0</button>
      <button class="key" type="button">.</button>
      <button class="key equals" type="button">=</button>
    </div>

    <div class="footer">UI shell only — add JavaScript to make it work.</div>
  </section>
</body>

</html>
